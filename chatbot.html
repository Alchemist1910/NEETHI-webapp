<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - NEETHI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="center">
    <!-- Header with Logo -->
    <div class="logo" style="margin-top: 20px;">
        <img src="image-removebg-preview.png" alt="Logo" style="width: 100px;">
    </div>

    <!-- Chat Interface -->
    <div class="chat-container"
        style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 600px; height: 70vh; display: flex; flex-direction: column; margin-bottom: 20px;">
        <div class="chat-messages"
            style="flex-grow: 1; overflow-y: auto; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px;">
            <div class="bot-message"
                style="background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 15px; max-width: 80%; width: fit-content; margin-bottom: 15px;">
                Hello! I am Neethi AI. How can I help you today?
            </div>
        </div>

        <div class="chat-input-area" style="display: flex; gap: 10px;">
            <input type="text" placeholder="Type your legal question here..."
                style="flex-grow: 1; padding: 12px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white;">
            <button
                style="padding: 12px 25px; border-radius: 25px; border: none; background: white; color: black; font-weight: bold; cursor: pointer;">SEND</button>
        </div>
    </div>

    <a href="home.html" style="color: #ccc; text-decoration: none; font-size: 14px; margin-bottom: 20px;">← Back to
        Home</a>

    <script src="script.js"></script>
</body>

</html>
