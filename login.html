<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NEETHI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="center">
    <div class="logo">
        <img src="image-removebg-preview.png" alt="Logo" style="width: 150px; margin-bottom: 20px;">
    </div>

    <div class="login-container"
        style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="margin-bottom: 30px; letter-spacing: 2px;">LOGIN</h2>

        <form style="display: flex; flex-direction: column; gap: 20px;">
            <input type="text" placeholder="Username"
                style="padding: 12px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white;">
            <input type="password" placeholder="Password"
                style="padding: 12px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white;">

            <button type="button" onclick="login()"
                style="padding: 12px; border-radius: 25px; border: none; background: white; color: black; font-weight: bold; cursor: pointer; transition: 0.3s;">LOGIN</button>
        </form>

        <a href="role.html"
            style="display: inline-block; margin-top: 20px; color: #ccc; text-decoration: none; font-size: 14px;">←
            Back</a>
    </div>

    <script src="script.js"></script>
</body>

</html>
